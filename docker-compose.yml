version: '3.9'

services:
  # 1. PostgreSQL Database Service
  shop-cart-pg:
    image: postgres:14.17-alpine
    container_name: shop-cart-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop-cart
    ports:
      - 5432:5432
    networks:
      - shop-cart-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d shop-cart']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Backend (NestJS) Service
  shop-cart-be:
    build:
      context: . 
      dockerfile: ./BE/Dockerfile 
      target: development 
    container_name: shop-cart-be
    depends_on:
      shop-cart-pg:
        condition: service_healthy
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - /app/BE/node_modules
    networks:
      - shop-cart-network
    command: sh -c "npm run build --workspace=shared && cd BE && npx prisma generate && npx prisma migrate deploy && cd .. && npm run start:dev --workspace=BE"  
  # 3. Frontend (Vite/React) Service
  shop-cart-fe:
    build:
      context: .
      dockerfile: ./FE/Dockerfile 
    container_name: shop-cart-fe
    ports:
      - 5173:5173
    volumes:
      - .:/app
      - /app/FE/node_modules
      - /app/shared/node_modules
    command: sh -c "npm install && npm run dev --workspace=FE"
    depends_on:
      - shop-cart-be
    networks:
      - shop-cart-network

networks:
  shop-cart-network:
    name: shop-cart-network
    driver: bridge